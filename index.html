<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>SureBet Pro</title><style>body{font-family:Arial;max-width:480px;margin:auto;padding:20px;background:#111;color:#fff}input,button{width:100%;padding:10px;margin:6px 0}</style></head><body><h2>SureBet Pro</h2><input id=l placeholder="Cuota Local" type=number><input id=e placeholder="Cuota Empate" type=number><input id=v placeholder="Cuota Visitante" type=number><input id=m placeholder="Monto" type=number><button onclick="c()">Calcular</button><div id=o></div><script>function c(){let A=+l.value,B=+e.value,C=+v.value,M=+m.value;if(!A||!B||!C||!M){o.innerHTML="Completa todos los campos";return;}let i=1/A+1/B+1/C,s1=M*((1/A)/i),s2=M*((1/B)/i),s3=M*((1/C)/i),co=Math.min(s1*A,s2*B,s3*C),g=co-M;o.innerHTML=(i<1?"✅ HAY SUREBET":"❌ NO HAY SUREBET")+"<br>Local: S/"+s1.toFixed(2)+"<br>Empate: S/"+s2.toFixed(2)+"<br>Visitante: S/"+s3.toFixed(2)+"<br>Ganancia: S/"+g.toFixed(2);}</script></body></html>
